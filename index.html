<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Rock Paper Scissor game</title>
  </head>
  <body>
    <section class="container">
      <div class="result-field">
        <div class="result-images">
          <span class="user-result">
            <img src="images/rock.png" alt="rock fist" />
          </span>
          <span class="robo-result">
            <img src="images/rock.png" alt="rock fist" />
          </span>
        </div>
        <div class="result">Let's Play!!</div>
      </div>

      <div class="option-imgs">
        <span class="option-img">
          <img src="images/rock.png" alt="fist rock" />
          <p>Rock</p>
        </span>

        <span class="option-img">
          <img src="images/paper.png" alt="fist rock" />
          <p>Paper</p>
        </span>

        <span class="option-img">
          <img src="images/scissors.png" alt="fist rock" />
          <p>Scissor</p>
        </span>
      </div>
    </section>

    <script src="index.js"></script>
  </body>
</html>
